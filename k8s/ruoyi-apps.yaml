apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-system
  namespace: ruoyi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-system
  template:
    metadata:
      labels:
        app: ruoyi-system
    spec:
      containers:
        - name: ruoyi-system
          image: ruoyi-system:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 9201
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: 192.168.65.254:8848
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR
              value: 192.168.65.254:8848
---
apiVersion: v1
kind: Service
metadata:
  name: ruoyi-system
  namespace: ruoyi
spec:
  selector:
    app: ruoyi-system
  ports:
    - port: 9201
      targetPort: 9201
---
